<!DOCTYPE html>
<html>
<head>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Tennis Controller - {playerLabel}</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at center, #151522 0%, #07070d 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        /* Fullscreen slide gesture interaction zone */
        .interactive-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        /* Directional Grid Layout */
        .controller-layout {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            grid-template-rows: 1fr 1.2fr 1fr;
            grid-template-areas:
                '. top .'
                'left center right'
                '. bottom .';
            width: 90vw;
            height: 90vw;
            max-width: 400px;
            max-height: 400px;
            position: relative;
        }

        .dir-node {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(255, 255, 255, 0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .node-label {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 2px;
            opacity: 0.4;
            transition: all 0.25s ease;
        }

        /* Top Node: FAST */
        .node-top {
            grid-area: top;
            border-radius: 24px 24px 8px 8px;
        }
        .node-top.active {
            background: rgba(0, 188, 212, 0.12);
            border-color: #00bcd4;
            box-shadow: 0 -10px 20px rgba(0, 188, 212, 0.2);
        }
        .node-top.active .node-label {
            color: #00e5ff;
            opacity: 1;
            text-shadow: 0 0 10px rgba(0, 188, 212, 0.5);
        }

        /* Bottom Node: LOB */
        .node-bottom {
            grid-area: bottom;
            border-radius: 8px 8px 24px 24px;
        }
        .node-bottom.active {
            background: rgba(255, 152, 0, 0.12);
            border-color: #ff9800;
            box-shadow: 0 10px 20px rgba(255, 152, 0, 0.2);
        }
        .node-bottom.active .node-label {
            color: #ffd740;
            opacity: 1;
            text-shadow: 0 0 10px rgba(255, 152, 0, 0.5);
        }

        /* Left Node: DROP */
        .node-left {
            grid-area: left;
            border-radius: 24px 8px 8px 24px;
        }
        .node-left.active {
            background: rgba(233, 30, 99, 0.12);
            border-color: #e91e63;
            box-shadow: -10px 0 20px rgba(233, 30, 99, 0.2);
        }
        .node-left.active .node-label {
            color: #ff4081;
            opacity: 1;
            text-shadow: 0 0 10px rgba(233, 30, 99, 0.5);
        }

        /* Right Node: NORMAL */
        .node-right {
            grid-area: right;
            border-radius: 8px 24px 24px 8px;
        }
        .node-right.active {
            background: rgba(76, 175, 80, 0.12);
            border-color: #4caf50;
            box-shadow: 10px 0 20px rgba(76, 175, 80, 0.2);
        }
        .node-right.active .node-label {
            color: #69f0ae;
            opacity: 1;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        /* Center Node: HUD & Status */
        .node-center {
            grid-area: center;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            margin: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05);
        }

        .player-badge {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .status {
            font-size: 10px;
            font-weight: 600;
            color: #ff5555;
            transition: color 0.3s ease;
            text-align: center;
            line-height: 1.3;
        }

        /* Start Overlay Button */
        .overlay-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 13, 17, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.4s ease;
        }

        .start-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00e676 0%, #00b0ff 100%);
            color: #000000;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 40px rgba(0, 230, 118, 0.3);
            border: none;
            outline: none;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .start-btn:active {
            transform: scale(0.92);
            box-shadow: 0 6px 20px rgba(0, 230, 118, 0.2);
        }

        /* Touch pointer trail / visual indicator */
        .drag-tracker {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.1s ease, opacity 0.15s ease;
            background: rgba(255, 255, 255, 0.05);
            z-index: 5;
            opacity: 0;
        }

        .pause-btn {
            position: absolute;
            bottom: 24px;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.7);
            padding: 10px 32px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            z-index: 8;
            transition: all 0.2s ease;
            text-transform: uppercase;
            outline: none;
        }
        .pause-btn:active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.8);
            color: #fff;
            transform: scale(0.95);
        }

        .snackbar {
            visibility: hidden;
            min-width: 200px;
            background-color: rgba(13, 13, 17, 0.95);
            color: #fff;
            text-align: center;
            border-radius: 20px;
            padding: 12px 24px;
            position: absolute;
            z-index: 20;
            bottom: 90px;
            left: 50%;
            transform: translate(-50%, 0);
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.15);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s, visibility 0.3s;
            pointer-events: none;
        }
        .snackbar.show {
            visibility: visible;
            opacity: 1;
            transform: translate(-50%, -10px);
        }

        .menu-btn {
            transition: all 0.2s ease;
        }
        .menu-btn:active {
            transform: scale(0.95);
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <!-- Start Button Overlay -->
    <div class='overlay-container' id='startOverlay'>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 20px; background: rgba(21, 21, 34, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); width: 85%; max-width: 340px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
            <h2 style="margin: 0 0 5px 0; font-size: 24px; font-weight: 900; letter-spacing: 2px; background: linear-gradient(135deg, #00e676 0%, #00b0ff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center;">TENNIS CONTROLLER</h2>
            
            <div style="width: 100%; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; margin-bottom: 20px;">
                <label style="font-size: 11px; font-weight: 800; opacity: 0.5; letter-spacing: 1.5px;">ROOM ID</label>
                <input type="text" inputmode="numeric" pattern="[0-9]*" id="roomInput" placeholder="Enter Room Code" style="width: 100%; box-sizing: border-box; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: #fff; font-size: 18px; text-align: center; font-weight: 800; letter-spacing: 2px; outline: none; transition: border 0.3s;" onfocus="this.style.borderColor='rgba(0, 230, 118, 0.5)';" onblur="this.style.borderColor='rgba(255,255,255,0.1)';">
                <span id="roomError" style="color: #ff5555; font-size: 12px; font-weight: 700; width: 100%; text-align: center; display: none; margin-top: 4px;">Room not found</span>
            </div>

            <button class='start-btn' id='startBtn' style="width: 100%; height: 52px; border-radius: 26px; font-size: 18px; font-weight: 900; letter-spacing: 2px; border: none; cursor: pointer; background: linear-gradient(135deg, #00e676 0%, #00b0ff 100%); color: #000; box-shadow: 0 8px 25px rgba(0, 230, 118, 0.25); transition: all 0.2s;">CONNECT</button>
        </div>
    </div>

    <!-- Interactive gesture zone -->
    <div class='interactive-zone' id='gestureZone'>
        <div class='controller-layout'>
            <div class='dir-node node-top' id='card-fast'>
                <span class='node-label'>▲ FAST</span>
            </div>
            <div class='dir-node node-left' id='card-drop'>
                <span class='node-label'>◀ DROP</span>
            </div>
            <div class='node-center'>
                <div class='player-badge' id="playerBadge">Player 1</div>
                <div class='status' id='status'>OFFLINE</div>
            </div>
            <div class='dir-node node-right' id='card-normal'>
                <span class='node-label'>NORMAL ▶</span>
            </div>
            <div class='dir-node node-bottom' id='card-lob'>
                <span class='node-label'>▼ LOB</span>
            </div>
        </div>
    </div>

    <!-- Sliding handle indicator -->
    <div class='drag-tracker' id='tracker'></div>

    <!-- Escape Overlay -->
    <div class='overlay-container' id='escapeOverlay' style="display: none; opacity: 0; background: rgba(13, 13, 17, 0.95); z-index: 15;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 20px; background: rgba(21, 21, 34, 0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 35px 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.08); width: 85%; max-width: 340px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
            <h2 style="margin: 0 0 10px 0; font-size: 24px; font-weight: 400; letter-spacing: 2px; color: #fff; text-align: center;">Game Paused</h2>
            <button class='menu-btn' id='continueBtn' style="width: 100%; height: 50px; border-radius: 25px; font-size: 16px; font-weight: 900; letter-spacing: 1.5px; border: none; cursor: pointer; background: #ffffff; color: #000; box-shadow: 0 8px 20px rgba(255, 255, 255, 0.2); transition: all 0.2s;">Continue</button>
            <button class='menu-btn' id='restartBtn' style="width: 100%; height: 50px; border-radius: 25px; font-size: 16px; font-weight: 900; letter-spacing: 1.5px; border: 2px solid #ffffff; cursor: pointer; background: transparent; color: #ffffff; transition: all 0.2s;">Restart</button>
            <button class='menu-btn' id='backHomeBtn' style="width: 100%; height: 50px; border-radius: 25px; font-size: 16px; font-weight: 900; letter-spacing: 1.5px; border: 2px solid #ffffff; cursor: pointer; background: transparent; color: #ffffff; transition: all 0.2s;">Back to Home</button>
        </div>
    </div>

    <!-- Pause Button -->
    <button id="pauseBtn" class="pause-btn">Pause</button>

    <!-- Snackbar tooltip -->
    <div id="snackbar" class="snackbar">Hold to pause game</div>

    <script>
        // --- CONFIGURATION ---
        const PIESOCKET_API_KEY = 'WanovP0lqkqTuDhoK6slIqEJ7pis5Vc1XUKBWX7g';
        const PIESOCKET_CLUSTER_ID = 'free.blr2';
        // ---------------------

        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const startOverlay = document.getElementById('startOverlay');
        const gestureZone = document.getElementById('gestureZone');
        const tracker = document.getElementById('tracker');
        const playerBadge = document.getElementById('playerBadge');
        const roomInput = document.getElementById('roomInput');

        const pauseBtn = document.getElementById('pauseBtn');
        const escapeOverlay = document.getElementById('escapeOverlay');
        const continueBtn = document.getElementById('continueBtn');
        const restartBtn = document.getElementById('restartBtn');
        const backHomeBtn = document.getElementById('backHomeBtn');
        const snackbar = document.getElementById('snackbar');
        const roomError = document.getElementById('roomError');

        function showRoomError(msg) {
            roomError.innerText = msg || "Room not found";
            roomError.style.display = 'block';
        }
        function hideRoomError() {
            roomError.style.display = 'none';
        }

        // Dismiss mobile keyboard on Enter
        roomInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                roomInput.blur();
            }
        });
        roomInput.addEventListener('input', hideRoomError);
        roomInput.addEventListener('focus', hideRoomError);

        const nodes = {
            'drop': document.getElementById('card-drop'),
            'fast': document.getElementById('card-fast'),
            'normal': document.getElementById('card-normal'),
            'lob': document.getElementById('card-lob')
        };
        
        let selectedShot = '';
        let ws;
        let isStarted = false;
        let connectionTimeout;
        let isMotionActive = false;
        let lastSwingTime = 0;
        const SWING_THRESHOLD = 18;

        const clientId = Math.random().toString(36).substring(2, 9);

        // Player state & Room state
        let playerRole = '';
        let roomId = '';

        // Parse query params to prefill values
        const urlParams = new URLSearchParams(window.location.search);
        const queryRoom = urlParams.get('room');
        const queryPlayer = urlParams.get('player');

        if (queryRoom) {
            roomInput.value = queryRoom;
            roomId = queryRoom;
        }
        if (queryPlayer) {
            const normalizedPlayer = queryPlayer.toLowerCase();
            if (normalizedPlayer === 'p1' || normalizedPlayer === 'p2') {
                setRole(normalizedPlayer);
            }
        }

        function setRole(role) {
            playerRole = role;
            if (role === 'p1') {
                playerBadge.innerText = 'Player 1';
                playerBadge.style.color = '#00e676';
                document.title = 'Tennis Controller - Player 1';
            } else {
                playerBadge.innerText = 'Player 2';
                playerBadge.style.color = '#00b0ff';
                document.title = 'Tennis Controller - Player 2';
            }
        }

        // Slide gesture tracking
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        const DRAG_THRESHOLD = 40; // Pixels to trigger a direction change

        function selectShot(type) {
            if (selectedShot !== type) {
                selectedShot = type;
                Object.keys(nodes).forEach(key => {
                    if (key === type) {
                        nodes[key].classList.add('active');
                    } else {
                        nodes[key].classList.remove('active');
                    }
                });
                if (navigator.vibrate) {
                    navigator.vibrate(15);
                }
            }
        }

        // Initialize default selection UI
        selectShot('normal');

        let pingInterval;

        function connect() {
            if (!roomId) {
                showRoomError("Room not found");
                return;
            }

            statusDiv.innerText = 'Connecting...';
            statusDiv.style.color = '#ffd740';

            const wsUrl = `wss://${PIESOCKET_CLUSTER_ID}.piesocket.com/v3/tennis-room-${roomId}?api_key=${PIESOCKET_API_KEY}`;
            
            ws = new WebSocket(wsUrl);
            
            // Set 6 seconds connection timeout to check if Room exists/replies
            clearTimeout(connectionTimeout);
            connectionTimeout = setTimeout(() => {
                if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN) && !playerRole) {
                    isStarted = false;
                    ws.close();
                    showRoomError("Room not found");
                }
            }, 6000);

            ws.onopen = () => {
                // Send connect message with clientId to let Unity assign the role
                ws.send(JSON.stringify({ type: 'connect', clientId: clientId }));
            };
            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    if (data.type === 'assign_role' && data.clientId === clientId) {
                        clearTimeout(connectionTimeout);
                        if (data.role === 'p1' || data.role === 'p2') {
                            setRole(data.role);
                            statusDiv.innerHTML = `ONLINE<br><span style='font-size:9px;color:#aaa;'>Room: ${roomId}</span>`;
                            statusDiv.style.color = '#00e676';
                            
                            // Hide overlay
                            startOverlay.style.opacity = 0;
                            setTimeout(() => {
                                startOverlay.style.display = 'none';
                            }, 400);

                            // Start periodic ping heartbeat to maintain connection status
                            if (pingInterval) clearInterval(pingInterval);
                            pingInterval = setInterval(() => {
                                if (ws && ws.readyState === WebSocket.OPEN) {
                                    ws.send(JSON.stringify({ player: playerRole, type: 'ping' }));
                                }
                            }, 2000);
                        } else if (data.role === 'full') {
                            alert('Room is full! Please try another room ID.');
                            statusDiv.innerText = 'OFFLINE';
                            statusDiv.style.color = '#ff5555';
                            ws.close();
                        }
                    }
                } catch (e) {
                    console.error("Error parsing message", e);
                }
            };
            ws.onclose = () => {
                clearTimeout(connectionTimeout);
                if (pingInterval) {
                    clearInterval(pingInterval);
                    pingInterval = null;
                }
                statusDiv.innerHTML = `OFFLINE<br><span style='font-size:9px;color:#aaa;'>Room: ${roomId}</span>`;
                statusDiv.style.color = '#ff5555';
                
                // Show overlay again if disconnected
                startOverlay.style.display = 'flex';
                startOverlay.style.opacity = 1;

                if (!playerRole && isStarted) {
                    isStarted = false;
                    showRoomError("Room not found");
                } else if (isStarted) {
                    setTimeout(connect, 2000);
                }
            };
            ws.onerror = (err) => {
                clearTimeout(connectionTimeout);
                console.error('ws error', err);
            };
        }

        function sendHit() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const payload = {
                    player: playerRole,
                    type: selectedShot
                };
                ws.send(JSON.stringify(payload));
                
                if (navigator.vibrate) {
                    navigator.vibrate(45);
                }
                
                // Visual flash feedback on active direction node
                const activeNode = nodes[selectedShot];
                if (activeNode) {
                    const origBg = activeNode.style.background;
                    activeNode.style.background = '#ffffff';
                    setTimeout(() => {
                        activeNode.style.background = origBg;
                    }, 80);
                }
            }
        }

        // Motion and swings
        let motionEventCount = 0;
        function handleMotion(e) {
            motionEventCount++;
            let acc = e.acceleration || e.accelerationIncludingGravity;
            if (!acc) return;

            let x = acc.x || 0;
            let y = acc.y || 0;
            let z = acc.z || 0;

            let mag = Math.sqrt(x*x + y*y + z*z);
            
            if (motionEventCount % 5 === 0) {
                statusDiv.innerHTML = `ONLINE<br><span style='font-size:9px;color:#aaa;'>Sensor: ` + mag.toFixed(1) + ` m/s²</span><br><span style='font-size:8px;color:#888;'>Room: ${roomId}</span>`;
            }

            let now = Date.now();
            if (mag > SWING_THRESHOLD && (now - lastSwingTime) > 600) {
                lastSwingTime = now;
                sendHit();
            }
        }

        function requestMotionPermission() {
            if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                alert('Warning: Mobile browsers require an HTTPS connection to access motion sensors.');
            }

            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('devicemotion', handleMotion);
                            isMotionActive = true;
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion);
                isMotionActive = true;
            }
        }

        // Pointer Drag & Slide events
        window.addEventListener('pointerdown', (e) => {
            if (!isStarted) return;
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;

            // Show drag tracker
            tracker.style.left = startX + 'px';
            tracker.style.top = startY + 'px';
            tracker.style.opacity = '1';
            tracker.style.transform = 'translate(-50%, -50%) scale(1)';
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            
            let dx = e.clientX - startX;
            let dy = e.clientY - startY;
            
            // Move tracker handle slightly trailing the finger
            tracker.style.left = e.clientX + 'px';
            tracker.style.top = e.clientY + 'px';

            let distance = Math.sqrt(dx*dx + dy*dy);
            if (distance > DRAG_THRESHOLD) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0) {
                        selectShot('normal');
                    } else {
                        selectShot('drop');
                    }
                } else {
                    if (dy < 0) {
                        selectShot('fast');
                    } else {
                        selectShot('lob');
                    }
                }
            }
        });

        window.addEventListener('pointerup', () => {
            isDragging = false;
            tracker.style.opacity = '0';
            tracker.style.transform = 'translate(-50%, -50%) scale(0)';
        });

        // Start Overlay Button click handler
        startBtn.addEventListener('click', (e) => {
            e.preventDefault();
            roomId = roomInput.value.trim();
            if (!roomId) {
                showRoomError("Room not found");
                return;
            }
            playerRole = ''; // Reset playerRole on new connection attempt
            isStarted = true;
            requestMotionPermission();
            connect();
        });

        // --- PAUSE & ESCAPE MENU FUNCTIONALITY ---
        let pauseTimer;
        let isLongPress = false;
        let snackbarTimeout;

        function showTooltip(message) {
            snackbar.innerText = message || "Hold to pause game";
            snackbar.classList.add('show');
            clearTimeout(snackbarTimeout);
            snackbarTimeout = setTimeout(() => {
                snackbar.classList.remove('show');
            }, 2000);
        }

        function openEscapeMenu() {
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
            escapeOverlay.style.display = 'flex';
            // Force layout reflow
            escapeOverlay.offsetHeight;
            escapeOverlay.style.opacity = 1;

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ player: playerRole, type: 'pause' }));
            }
        }

        function closeEscapeMenu() {
            escapeOverlay.style.opacity = 0;
            setTimeout(() => {
                escapeOverlay.style.display = 'none';
            }, 400);
        }

        // Pause Button Long Press detection
        pauseBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            if (!isStarted) return;
            isLongPress = false;
            pauseTimer = setTimeout(() => {
                isLongPress = true;
                openEscapeMenu();
            }, 800);
        });

        pauseBtn.addEventListener('pointerup', (e) => {
            e.stopPropagation();
            if (!isStarted) return;
            clearTimeout(pauseTimer);
            if (!isLongPress) {
                showTooltip("Hold to pause game");
            }
        });

        pauseBtn.addEventListener('pointercancel', (e) => {
            clearTimeout(pauseTimer);
        });

        pauseBtn.addEventListener('pointerleave', (e) => {
            clearTimeout(pauseTimer);
        });

        // Menu Overlay Action Handlers
        continueBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeEscapeMenu();
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ player: playerRole, type: 'continue' }));
            }
        });

        restartBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeEscapeMenu();
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ player: playerRole, type: 'restart' }));
            }
        });

        backHomeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            closeEscapeMenu();
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ player: playerRole, type: 'backhome' }));
            }
            
            // Go back to landing screen on phone controller
            isStarted = false;
            if (ws) {
                ws.close();
            }
        });
    </script>
</body>
</html>
