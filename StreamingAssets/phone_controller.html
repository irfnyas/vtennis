<!DOCTYPE html>
<html>
<head>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no'>
    <title>Tennis Controller - {playerLabel}</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at center, #151522 0%, #07070d 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        /* Fullscreen slide gesture interaction zone */
        .interactive-zone {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        /* Directional Grid Layout */
        .controller-layout {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            grid-template-rows: 1fr 1.2fr 1fr;
            grid-template-areas:
                '. top .'
                'left center right'
                '. bottom .';
            width: 90vw;
            height: 90vw;
            max-width: 400px;
            max-height: 400px;
            position: relative;
        }

        .dir-node {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(255, 255, 255, 0.05);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .node-label {
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 2px;
            opacity: 0.4;
            transition: all 0.25s ease;
        }

        /* Top Node: FAST */
        .node-top {
            grid-area: top;
            border-radius: 24px 24px 8px 8px;
        }
        .node-top.active {
            background: rgba(0, 188, 212, 0.12);
            border-color: #00bcd4;
            box-shadow: 0 -10px 20px rgba(0, 188, 212, 0.2);
        }
        .node-top.active .node-label {
            color: #00e5ff;
            opacity: 1;
            text-shadow: 0 0 10px rgba(0, 188, 212, 0.5);
        }

        /* Bottom Node: LOB */
        .node-bottom {
            grid-area: bottom;
            border-radius: 8px 8px 24px 24px;
        }
        .node-bottom.active {
            background: rgba(255, 152, 0, 0.12);
            border-color: #ff9800;
            box-shadow: 0 10px 20px rgba(255, 152, 0, 0.2);
        }
        .node-bottom.active .node-label {
            color: #ffd740;
            opacity: 1;
            text-shadow: 0 0 10px rgba(255, 152, 0, 0.5);
        }

        /* Left Node: DROP */
        .node-left {
            grid-area: left;
            border-radius: 24px 8px 8px 24px;
        }
        .node-left.active {
            background: rgba(233, 30, 99, 0.12);
            border-color: #e91e63;
            box-shadow: -10px 0 20px rgba(233, 30, 99, 0.2);
        }
        .node-left.active .node-label {
            color: #ff4081;
            opacity: 1;
            text-shadow: 0 0 10px rgba(233, 30, 99, 0.5);
        }

        /* Right Node: NORMAL */
        .node-right {
            grid-area: right;
            border-radius: 8px 24px 24px 8px;
        }
        .node-right.active {
            background: rgba(76, 175, 80, 0.12);
            border-color: #4caf50;
            box-shadow: 10px 0 20px rgba(76, 175, 80, 0.2);
        }
        .node-right.active .node-label {
            color: #69f0ae;
            opacity: 1;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        /* Center Node: HUD & Status */
        .node-center {
            grid-area: center;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            margin: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05);
        }

        .player-badge {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .status {
            font-size: 10px;
            font-weight: 600;
            color: #ff5555;
            transition: color 0.3s ease;
            text-align: center;
            line-height: 1.3;
        }

        /* Start Overlay Button */
        .overlay-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 13, 17, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.4s ease;
        }

        .setup-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 30px;
            width: 85%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .setup-title {
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: #00b0ff;
            text-align: center;
        }

        .input-group {
            width: 100%;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.5);
        }

        .input-group input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: all 0.25s ease;
        }

        .input-group input:focus {
            border-color: #00b0ff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 10px rgba(0, 176, 255, 0.2);
        }

        .player-selector {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .player-opt {
            flex: 1;
            padding: 12px 0;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .player-opt.active {
            background: rgba(0, 230, 118, 0.15);
            border-color: #00e676;
            color: #00e676;
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.15);
        }

        .start-btn {
            width: 100%;
            height: 54px;
            border-radius: 27px;
            background: linear-gradient(135deg, #00e676 0%, #00b0ff 100%);
            color: #000000;
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 25px rgba(0, 230, 118, 0.25);
            border: none;
            outline: none;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
        }

        .start-btn:active {
            transform: scale(0.96);
        }

        /* Touch pointer trail / visual indicator */
        .drag-tracker {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.1s ease, opacity 0.15s ease;
            background: rgba(255, 255, 255, 0.05);
            z-index: 5;
            opacity: 0;
        }
    </style>
</head>
<body>
    <!-- Start Settings Overlay -->
    <div class='overlay-container' id='startOverlay'>
        <div class='setup-card'>
            <div id='staticSetup' style='display: none;'>
                <div class='setup-title'>CONNECT TO GAME</div>
                <div class='input-group'>
                    <label>Game Host / IP Address</label>
                    <input type='text' id='hostInput' placeholder='e.g., 192.168.1.5:8080'>
                </div>
                <div class='input-group'>
                    <label>Select Player</label>
                    <div class='player-selector'>
                        <button type='button' class='player-opt active' id='optP1'>PLAYER 1</button>
                        <button type='button' class='player-opt' id='optP2'>PLAYER 2</button>
                    </div>
                </div>
            </div>
            <button class='start-btn' id='startBtn'>START</button>
        </div>
    </div>

    <!-- Interactive gesture zone -->
    <div class='interactive-zone' id='gestureZone'>
        <div class='controller-layout'>
            <div class='dir-node node-top' id='card-fast'>
                <span class='node-label'>▲ FAST</span>
            </div>
            <div class='dir-node node-left' id='card-drop'>
                <span class='node-label'>◀ DROP</span>
            </div>
            <div class='node-center'>
                <div class='player-badge' id='badgeDisplay'>{playerLabel}</div>
                <div class='status' id='status'>Connecting...</div>
            </div>
            <div class='dir-node node-right' id='card-normal'>
                <span class='node-label'>NORMAL ▶</span>
            </div>
            <div class='dir-node node-bottom' id='card-lob'>
                <span class='node-label'>▼ LOB</span>
            </div>
        </div>
    </div>

    <!-- Sliding handle indicator -->
    <div class='drag-tracker' id='tracker'></div>

    <script>
        const statusDiv = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const startOverlay = document.getElementById('startOverlay');
        const gestureZone = document.getElementById('gestureZone');
        const tracker = document.getElementById('tracker');
        const badgeDisplay = document.getElementById('badgeDisplay');
        
        // Setup selectors
        const staticSetup = document.getElementById('staticSetup');
        const hostInput = document.getElementById('hostInput');
        const optP1 = document.getElementById('optP1');
        const optP2 = document.getElementById('optP2');

        const nodes = {
            'drop': document.getElementById('card-drop'),
            'fast': document.getElementById('card-fast'),
            'normal': document.getElementById('card-normal'),
            'lob': document.getElementById('card-lob')
        };
        
        let selectedShot = '';
        let wsProto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        let wsUrl = wsProto + '//' + window.location.host + '/ws/{wsPath}';
        let ws;
        let isStarted = false;
        let isMotionActive = false;
        let lastSwingTime = 0;
        const SWING_THRESHOLD = 18;

        // Slide gesture tracking
        let isDragging = false;
        let startX = 0;
        let startY = 0;
        const DRAG_THRESHOLD = 40; // Pixels to trigger a direction change

        // Detect if template is static-hosted (like GitHub Pages or local file)
        const isStaticTemplate = (
            wsUrl.includes('{wsPath}') || 
            wsUrl.includes('%7BwsPath%7D') || 
            window.location.hostname.endsWith('github.io') || 
            window.location.protocol === 'file:'
        );

        if (isStaticTemplate) {
            // Display static connection configuration inputs
            staticSetup.style.display = 'block';
            
            // Set up pre-filled local IP/Host if saved previously
            const savedIP = localStorage.getItem('tennis_game_ip');
            if (savedIP) {
                hostInput.value = savedIP;
            } else {
                hostInput.value = '127.0.0.1:8080';
            }

            // Set up saved player selection if saved previously
            const savedPlayer = localStorage.getItem('tennis_selected_player') || 'p1';
            setPlayerActive(savedPlayer);
        }

        // Toggle player options on touch
        optP1.addEventListener('pointerdown', () => setPlayerActive('p1'));
        optP2.addEventListener('pointerdown', () => setPlayerActive('p2'));

        function setPlayerActive(player) {
            if (player === 'p1') {
                optP1.classList.add('active');
                optP2.classList.remove('active');
            } else {
                optP2.classList.add('active');
                optP1.classList.remove('active');
            }
        }

        function selectShot(type) {
            if (selectedShot !== type) {
                selectedShot = type;
                Object.keys(nodes).forEach(key => {
                    if (key === type) {
                        nodes[key].classList.add('active');
                    } else {
                        nodes[key].classList.remove('active');
                    }
                });
                if (navigator.vibrate) {
                    navigator.vibrate(15);
                }
            }
        }

        // Initialize default selection UI
        selectShot('normal');

        function connect() {
            // Close existing connection if any
            if (ws) {
                try { ws.close(); } catch(e) {}
            }
            ws = new WebSocket(wsUrl);
            ws.onopen = () => {
                statusDiv.innerText = 'ONLINE';
                statusDiv.style.color = '#00e676';
                checkAndHideOverlay();
            };
            ws.onclose = () => {
                statusDiv.innerText = 'OFFLINE';
                statusDiv.style.color = '#ff5555';
                setTimeout(connect, 2000);
            };
            ws.onerror = (err) => {
                console.error('ws error', err);
            };
        }

        function checkAndHideOverlay() {
            if (isStarted && ws && ws.readyState === WebSocket.OPEN) {
                startOverlay.style.opacity = 0;
                setTimeout(() => {
                    startOverlay.style.display = 'none';
                }, 400);
            }
        }

        function sendHit() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send('hit:' + selectedShot);
                if (navigator.vibrate) {
                    navigator.vibrate(45);
                }
                
                // Visual flash feedback on active direction node
                const activeNode = nodes[selectedShot];
                if (activeNode) {
                    const origBg = activeNode.style.background;
                    activeNode.style.background = '#ffffff';
                    setTimeout(() => {
                        activeNode.style.background = origBg;
                    }, 80);
                }
            }
        }

        // Motion and swings
        let motionEventCount = 0;
        function handleMotion(e) {
            motionEventCount++;
            let acc = e.acceleration || e.accelerationIncludingGravity;
            if (!acc) return;

            let x = acc.x || 0;
            let y = acc.y || 0;
            let z = acc.z || 0;

            let mag = Math.sqrt(x*x + y*y + z*z);
            
            if (motionEventCount % 5 === 0) {
                statusDiv.innerHTML = `ONLINE<br><span style='font-size:9px;color:#aaa;'>Sensor: ` + mag.toFixed(1) + ` m/s²</span>`;
            }

            let now = Date.now();
            if (mag > SWING_THRESHOLD && (now - lastSwingTime) > 600) {
                lastSwingTime = now;
                sendHit();
            }
        }

        function requestMotionPermission() {
            if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
                alert('Warning: Mobile browsers require an HTTPS connection to access motion sensors.');
            }

            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            window.addEventListener('devicemotion', handleMotion);
                            isMotionActive = true;
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion);
                isMotionActive = true;
            }
        }

        // Pointer Drag & Slide events
        window.addEventListener('pointerdown', (e) => {
            if (!isStarted) return;
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;

            // Show drag tracker
            tracker.style.left = startX + 'px';
            tracker.style.top = startY + 'px';
            tracker.style.opacity = '1';
            tracker.style.transform = 'translate(-50%, -50%) scale(1)';
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            
            let dx = e.clientX - startX;
            let dy = e.clientY - startY;
            
            // Move tracker handle slightly trailing the finger
            tracker.style.left = e.clientX + 'px';
            tracker.style.top = e.clientY + 'px';

            let distance = Math.sqrt(dx*dx + dy*dy);
            if (distance > DRAG_THRESHOLD) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 0) {
                        selectShot('normal');
                    } else {
                        selectShot('drop');
                    }
                } else {
                    if (dy < 0) {
                        selectShot('fast');
                    } else {
                        selectShot('lob');
                    }
                }
            }
        });

        window.addEventListener('pointerup', () => {
            isDragging = false;
            tracker.style.opacity = '0';
            tracker.style.transform = 'translate(-50%, -50%) scale(0)';
        });

        // Start Overlay Button click handler
        startBtn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            isStarted = true;
            requestMotionPermission();

            if (isStaticTemplate) {
                // Read configuration inputs
                const host = hostInput.value.trim().replace(/^https?:\/\//, '');
                const player = optP2.classList.contains('active') ? 'p2' : 'p1';
                
                // Save settings
                localStorage.setItem('tennis_game_ip', host);
                localStorage.setItem('tennis_selected_player', player);

                // Update UI badge
                badgeDisplay.innerText = player === 'p2' ? 'Player 2' : 'Player 1';

                // Build WS URL
                const isNgrok = host.includes('ngrok');
                const proto = (window.location.protocol === 'https:' || isNgrok) ? 'wss:' : 'ws:';
                wsUrl = `${proto}//${host}/ws/${player}`;

                // Initiate Connection
                statusDiv.innerText = 'Connecting...';
                statusDiv.style.color = '#ff5555';
                connect();
            } else {
                checkAndHideOverlay();
            }
        });

        // If served directly by server, connect immediately.
        // Static templates connect only after tapping START.
        if (!isStaticTemplate) {
            connect();
        }
    </script>
</body>
</html>
